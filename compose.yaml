services:
  validator:
    image: amsterdam/rfc9068-access-token-validator:latest
    build:
      context: .
      dockerfile: Containerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.13}
    volumes:
      - ".:/app:rw,Z"
    develop:
      watch:
        - action: rebuild
          path: ./uv.lock
    depends_on:
      keycloak:
        condition: service_healthy
  keycloak:
    build:
      context: keycloak
      dockerfile: Containerfile
    image: amsterdam/rfc9068-access-token-validator-keycloak:latest
    command:
      - "/opt/keycloak/bin/kc.sh"
      - "start-dev"
      - "--http-port"
      - "8002"
      - "--health-enabled"
      - "true"
    ports:
      - "8002:8002"
    volumes:
      - "./keycloak/import:/import"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    healthcheck:
      test: ["CMD", "curl", "--head", "-fsS", "http://localhost:9000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
